<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analog Clock</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #6f338b, #d98a5f);
    font-family: 'Segoe UI', Arial, sans-serif;
  }

  .clock {
    position: relative;
    width: 300px;
    height: 300px;
    background: #f4f1ea; 
    border: 12px solid #2c2c54;
    border-radius: 50%;
    box-shadow: 0 0 25px rgba(0, 0, 0, 0.4);
  }

  .clock::after {
    content: '';
    position: absolute;
    width: 14px;
    height: 14px;
    background: #2c2c54;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
  }

  .number {
    position: absolute;
    width: 100%;
    height: 100%;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    color: #2c2c54;
  }

  .number span {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 24px;
    height: 24px;
    margin-left: -12px;
    margin-top: -12px;
    line-height: 24px;
  }

  .hand {
    position: absolute;
    bottom: 50%;
    left: 50%;
    transform-origin: bottom;
    border-radius: 10px;
    background: #2c2c54;
  }

  .hour-hand {
    width: 6px;
    height: 70px;
    margin-left: -3px;
  }

  .minute-hand {
    width: 4px;
    height: 100px;
    margin-left: -2px;
    background: #40407a;
  }

  .second-hand {
    width: 2px;
    height: 110px;
    margin-left: -1px;
    background: #fc5c7d;
  }

body {
  position: relative;
  overflow: hidden; /* keeps the blurred orbs from causing scrollbars */
  background: linear-gradient(135deg, #1e1e2f, #2d2b3a, #3a3450);
}

body::before,
body::after {
  content: '';
  position: absolute;
  border-radius: 50%;
  filter: blur(90px);
  opacity: 0.35;
  z-index: 0;
}

body::before {
  width: 380px;
  height: 380px;
  background: #a18cd1; /* soft lavender */
  top: -100px;
  left: -80px;
}

body::after {
  width: 320px;
  height: 320px;
  background: #fbc2eb; /* soft pink */
  bottom: -100px;
  right: -60px;
}

.clock,
.made-by {
  position: relative;
  z-index: 1; /* keeps clock above the glow orbs */
}
</style>
</head>
<body>

  <div class="clock">
    <!-- numbers 1 to 12 placed using rotate + counter-rotate trick -->
    <div class="number"></div>

    <div class="hand hour-hand" id="hourHand"></div>
    <div class="hand minute-hand" id="minuteHand"></div>
    <div class="hand second-hand" id="secondHand"></div>
  </div>

<script>
  const numberContainer = document.querySelector('.number');
  for (let i = 1; i <= 12; i++) {
    const angle = i * 30; // 360 / 12 = 30 degrees per number
    const span = document.createElement('span');
    span.textContent = i;
    span.style.transform = `rotate(${angle}deg) translate(0, -125px) rotate(-${angle}deg)`;
    numberContainer.appendChild(span);
  }

  const hourHand = document.getElementById('hourHand');
  const minuteHand = document.getElementById('minuteHand');
  const secondHand = document.getElementById('secondHand');

  function updateClock() {
    const now = new Date();
    const hours = now.getHours() % 12;
    const minutes = now.getMinutes();
    const seconds = now.getSeconds();
    const secondDeg = seconds * 6;                     
    const minuteDeg = minutes * 6 + seconds * 0.1;    
    const hourDeg = hours * 30 + minutes * 0.5;         

    secondHand.style.transform = `rotate(${secondDeg}deg)`;
    minuteHand.style.transform = `rotate(${minuteDeg}deg)`;
    hourHand.style.transform = `rotate(${hourDeg}deg)`;
  }

  updateClock();
  setInterval(updateClock, 1000);
</script>

</body>
</html>
